%% No "pdftitle", "pdfauthor", "pdfsubject", "pdfkeywords", and
%% "final"/"draft" keys can be found here.  These "pdf*" keys are
%% set by dedicated \pdfinfo*{} macros in the configuration file
%% `ipothes.cfg', the "final" key is hardcoded in document class
%% and "final"/"draft" setting is ignored here.
%% See hyperref manual at https://ctan.org/pkg/hyperref for more.

\hypersetup{%
  addtopdfcreator={and the ipothes document class},
%%
%% Set the base URL of the PDF document:
  baseurl=https://is.slu.cz/www/hle0002/vyuka/aid/ipothes/,
%% 
%% Driver if compiled with latex (not pdflatex):
%  driverfallback=hypertex,
%  driverfallback=dvips,
%  driverfallback=ps2pdf,
%  driverfallback=dvipdfm,
  driverfallback=dvipdfmx,
%%
%% How the links are colored:
  colorlinks=true,
  linkcolor=[rgb]{0.9,0,0}, % red -> darker red
%  anchorcolor=black,
  citecolor=[rgb]{0.1,0.4,1}, % green -> lighter blue
%  filecolor=cyan,
%  menucolor=red,
%  runcolor=filecolor,
  urlcolor=[rgb]{0.8,0,0.8}, % magenta -> dark magenta
%%
%% If true, adds backlink text to the end of each bibitem:
  backref=false,
  pagebackref=false,
%%
%% How TOC, LOF, LOT hyperlinks are displayed
%  linktoc=section,
%  linktoc=page,
%  linktoc=all,
%  linktoc=none,
  linktocpage=true, % same as linktoc=page,
%  breaklinks=false,
%%
%% Adobe Acrobat Reader bookmarks and thumbnails behavior:
  bookmarks=false,
%  bookmarksopen=false,
%  bookmarksopenlevel=1,
%  bookmarksnumbered=false,
%  bookmarkstype=toc,
%  pdfpagemode=UseNone,
%  pdfnonfullscreenpagemode=UseNone,
  pdfpagemode=UseThumbs,
  pdfnonfullscreenpagemode=UseThumbs,
%  pdfpagemode=UseOutlines,
%  pdfnonfullscreenpagemode=UseOutlines,
%  pdfpagemode=UseOC,
%  pdfnonfullscreenpagemode=UseOC,
%%
%% PDF display:
%  pdfpagelayout=SinglePage,
%  pdfpagelayout=OneColumn,
%  pdfpagelayout=TwoColumnLeft,
%  pdfpagelayout=TwoColumnRight,
%  pdfpagelayout=TwoPageLeft,
  pdfpagelayout=TwoPageRight,
%  pdfpagetransition=R,
%  pdfpagetransition=Split,
%  pdfpagetransition=Blinds,
%  pdfpagetransition=Box,
%  pdfpagetransition=Wipe,
%  pdfpagetransition=Dissolve,
%  pdfpagetransition=Glitter,
%  pdfpagetransition=Fly,
%  pdfpagetransition=Push,
%  pdfpagetransition=Cover,
%  pdfpagetransition=Uncover,
%  pdfpagetransition=Fade,
  pdfview=Fit,
  pdfstartview=Fit,
  pdfremotestartview=Fit,
%  pdffitwindow=true,
}

\endinput

%%
%% End of file `hyperref.cfg'.
