\newcommand*{\rhocent}{\ensuremath{\rho_{\mathrm{c}}}}
\newcommand*{\rhovac}{\ensuremath{\rho_{\mathrm{vac}}}}
\newcommand*{\pcent}{p_{\mathrm{c}}}
\newcommand*{\Lngt}{{\mathcal{L}^{\ast}}}
