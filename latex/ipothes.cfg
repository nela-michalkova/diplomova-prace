%% Math
\let\equation\gather
\let\endequation\endgather
\newcommand*{\dif}{\mathrm{d}}
%\newcommand*{\Dif}{\mathrm{D}}
\newcommand*{\euler}{\mathrm{e}}
\newcommand*{\oder}[2]{\frac{\dif #1}{\dif #2}}
\newcommand*{\loder}[2]{\dif #1/\dif #2}
\newcommand*{\pder}[2]{\frac{\partial #1}{\partial #2}}
\newcommand*{\pdder}[2]{\frac{\partial^{2}#1}{\partial #2^{2}}}
\newcommand*{\pdderx}[3]{\frac{\partial^{2}#1}{\partial #2\,\partial #3}}
\newcommand*{\lpder}[2]{\partial #1/\partial #2}
\newcommand*{\pderop}[1]{\frac{\partial}{\partial #1}}
\newcommand*{\eto}[1]{\ensuremath{\euler^{#1}}}
\newcommand*{\ffrac}[2]{#1/#2}
\newcommand*{\mx}[1]{\mathsf{#1}}
\newcommand*{\trp}[1]{#1^{\mathrm{T}}}
\renewcommand*{\vector}{\mathsf}
\renewcommand*{\matrix}{\mathsf}
\newcommand*{\iu}{\mathrm{i}}
\newcommand*{\hz}[1][]{\ensuremath{\mathrm{#1Hz}}}
\newcommand*{\eV}[1][]{\ensuremath{\mathrm{#1e\kern-.10em V}}}
\newcommand*{\celsius}{\ensuremath{{}^{\circ}\mathrm{C}}}
\newcommand*{\us}{\,}
%\renewcommand{\.}{\,\mbox{.}}
%\let\micro\upmu % requires mathtime with upright greek letters
\let\micro\mu
\newcommand*{\micv}{\ensuremath{\micro\!\mathrm{V}}}
\newcommand*{\SaodS}{Schwarz\-schild%
