%% Index creation by MakeIndex
\newcommand{\ii}[1]{{\itshape#1}}
\newcommand{\ib}[1]{{\bfseries\itshape#1}}
\newcommand{\INDEX}[1]{\bgroup\def~{ }\index{#1|ii}\egroup}
\newcommand{\RINDEX}[1]{#1\bgroup\def~{ }\index{#1|ii}\egroup}
\newcommand{\INDEM}[1]{\bgroup\def~{ }\index{#1|ib}\egroup}
\newcommand{\RINDEM}[1]{#1\bgroup\def~{ }\index{#1|ib}\egroup}

